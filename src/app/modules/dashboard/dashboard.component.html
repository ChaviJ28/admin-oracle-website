<div class="">
  <div>
    <div style="width: 100px; float:left; height:100px; margin:5px">
        <h1 class="admin">Admin</h1>
    </div>
   </div>
<div class="container">
    <div style=" display: flex; justify-content: end;">
        <button mat-raised-button (click)="openDialog()" color="primary"><mat-icon>add</mat-icon>Add</button>
    </div>
    <div class=" mx-auto"  style="max-width: 1200px;" >
        <mat-form-field>
            <mat-label>Filter</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="e.g tom" #input>
        </mat-form-field>
          
          <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource" matSort>
          
            
              <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                <td mat-cell *matCellDef="let row"> {{row.id}} </td>
              </ng-container>
          
    
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> name </th>
                <td mat-cell *matCellDef="let row"> {{row.name}} </td>
              </ng-container>
         
              <ng-container matColumnDef="age">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Age </th>
                <td mat-cell *matCellDef="let row"> {{row.age}} </td>
              </ng-container>
          
              <ng-container matColumnDef="address">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Address </th>
                <td mat-cell *matCellDef="let row"> {{row.address}} </td>
              </ng-container>

              <ng-container matColumnDef="gender">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Gender </th>
                <td mat-cell *matCellDef="let row"> {{row.gender}} </td>
              </ng-container>

              <ng-container matColumnDef="actions" class="paginationMark">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Action </th>
                <td mat-cell *matCellDef="let row">
                    <div  style="display: flex;">
                          <button mat-icon-button>
                            <mat-icon>edit</mat-icon>
                          </button>
                          <button mat-icon-button>
                            <mat-icon>delete</mat-icon>
                          </button>
                    </div> 
              </td>
              <td></td>
              </ng-container>
          
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
     
              <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
              </tr>
            </table>
          
            <mat-paginator [pageSizeOptions]="[ 10, 20, 100]" aria-label="Select page of users"></mat-paginator>
          </div>
    </div>
</div>
